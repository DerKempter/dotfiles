"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$hostname$shlvl$jobs$status$fill$cmd_duration$battery$memory_usage${custom.disk_usage}$os$sudo$docker_context
$git_branch$git_commit$git_state${custom.git_identity}$git_status$nodejs$dotnet$python$kubernetes
$character"""

palette = "catppuccin_mocha"

[fill]
symbol = " "
style = "cyan"

[directory]
style = "bold fg:base bg:lavender"
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
format = "[оӮ¶](lavender)[$symbol$path]($style)[оӮҙ](lavender) "

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "уұ‘ў "
"Music" = "у°қҡ "
"Pictures" = "у°үҸ "
"dotfiles" = "у°’“ "

[character]
success_symbol = "[у°„ҫ](bold sky)"
error_symbol = "[у°„ҫ](bold maroon)"

[os]
disabled = false
style = "bg:mauve fg:base"
format = "[оӮ¶](mauve)[ $symbol ]($style)[оӮҙ](mauve) "

[os.symbols]
Linux = "пҢҡ"
CachyOS = "пҢһ"
Arch = "у°ЈҮ"
Ubuntu = "у°•Ҳ"
Windows = "у°ҚІ"

[hostname]
ssh_only = true
format = "[оӮ¶](sky)[у°’Ӣ $hostname]($style)[оӮҙ](sky) "
style = "bg:sky fg:base"

[jobs]
symbol = "пҖ“ "
style = "bg:peach fg:base"
format = "[оӮ¶](peach)[$symbol$number]($style)[оӮҙ](peach) "

[git_branch]
symbol = "пҗҳ "
style = "bg:base fg:lavender"
truncation_length = 35
truncation_symbol = "вҖҰ"
format = "[оӮ¶](base)[$symbol$branch]($style)[оӮҙ](base) "

[git_commit]
commit_hash_length = 4
tag_symbol = "пҗ’ "
style = "bg:base fg:subtext1"
format = "[оӮ¶](base)[$symbol$hash]($style)[оӮҙ](base) "

[git_state]
style = "bg:base fg:maroon"
format = "[оӮ¶](base)[$state($progress_current/$progress_total)]($style)[оӮҙ](base) "

[git_status]
format = "([$staged$modified$deleted$renamed$untracked$stashed$conflicted$ahead_behind](fg:pink))"
style = "fg:pink"
staged     = "[оӮ¶](pink)[staged](bg:pink fg:base)[оӮҙ](pink) "
modified   = "[оӮ¶](pink)[modified](bg:pink fg:base)[оӮҙ](pink) "
deleted    = "[оӮ¶](pink)[deleted](bg:pink fg:base)[оӮҙ](pink) "
renamed    = "[оӮ¶](pink)[renamed](bg:pink fg:base)[оӮҙ](pink) "
untracked  = "[оӮ¶](pink)[untracked](bg:pink fg:base)[оӮҙ](pink) "
stashed    = "[оӮ¶](pink)[stashed](bg:pink fg:base)[оӮҙ](pink) "
conflicted = "[оӮ¶](pink)[conflict](bg:pink fg:base)[оӮҙ](pink) "
ahead      = "[оӮ¶](pink)[у°¶Ј${count}](bg:pink fg:base)[оӮҙ](pink) "
behind     = "[оӮ¶](pink)[у°¶Ў${count}](bg:pink fg:base)[оӮҙ](pink) "
diverged   = "[оӮ¶](pink)[у°¶Өу°¶Ј${ahead_count}у°¶Ў${behind_count}](bg:pink fg:base)[оӮҙ](pink) "

[nodejs]
symbol = "оңҳ "
style = "bg:teal fg:base"
format = "[оӮ¶](teal)[$symbol($version)]($style)[оӮҙ](teal) "

[docker_context]
disabled = false
symbol = "пҢҲ "
style = "bg:sky fg:base"
only_with_files = false
format = "[оӮ¶](sky)[$symbol$context]($style)[оӮҙ](sky) "

[kubernetes]
symbol = "вҳё "
style = "bg:sky fg:base"
disabled = false
format = "[оӮ¶](sky)[$symbol$context]($style)[оӮҙ](sky) "

[cmd_duration]
min_time = 500
style = "bg:peach fg:base"
format = "[оӮ¶](peach)[уұҺ« $duration]($style)[оӮҙ](peach) "

[battery]
full_symbol = "у°Ғ№ "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "у°Ӯғ "
format = "[$styleоӮ¶](fg:$style)[$symbol$percentage](bg:$style fg:base)[оӮҙ $style](fg:$style) "

[[battery.display]]
threshold = 20
style = "maroon"

[[battery.display]]
threshold = 50
style = "peach"

[memory_usage]
disabled = true
threshold = 75
symbol = "у°Қӣ "
style = "bg:pink fg:base"
format = "[оӮ¶](pink)[$symbol$ram_pct]($style)[оӮҙ](pink) "

[custom.disk_usage]
command = "usage=$(df $HOME --output=pcent | tail -1 | tr -dc '0-9'); if [ \"$usage\" -gt 85 ]; then echo $usage; fi"
shell = ["sh"]
style = "bg:maroon fg:base"
format = "([оӮ¶](maroon)[у°ӢҠ $output%]($style)[оӮҙ](maroon) )"
when = "true"

[custom.git_identity]
command = "local=$(git config --local user.email); global=$(git config --global user.email); if [ -n \"$local\" ] && [ \"$local\" != \"$global\" ]; then echo \"$local\"; fi"
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
shell = ["sh"]
style = "bg:lavender fg:base"
format = "([оӮ¶](lavender)[пҖҮ $output]($style)[оӮҙ](lavender) )"

[dotnet]
symbol = "у°Ә® "
style = "bg:sky fg:base"
format = "[оӮ¶](sky)[$symbol($version)]($style)[оӮҙ](sky) "

[python]
symbol = "оҳҶ "
style = "bg:rosewater fg:base"
format = "[оӮ¶](rosewater)[$symbol${pyenv_prefix}($version )($virtualenv)]($style)[оӮҙ](rosewater) "

[status]
disabled = false
style = "bg:maroon fg:base"
symbol = "вңҳ"
format = "[оӮ¶](maroon)[ $symbol ]($style)[оӮҙ](maroon) "
map_symbol = true

[sudo]
disabled = false
symbol = "у°һҖ"
style = "bg:maroon fg:base"
format = "[оӮ¶](maroon)[ $symbol ]($style)[оӮҙ](maroon) "

[palettes.catppuccin_mocha]
# --- background ---
crust = "#11111b"
mantle = "#181825"
base = "#1e1e2e"

overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"

surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"

# --- text ---
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"

# --- accents ---
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"

dirtypink = "#240f33"
