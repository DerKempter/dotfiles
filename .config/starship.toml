"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$fill$cmd_duration$os$docker_context
$git_branch$git_status$nodejs$dotnet$python$kubernetes
$character"""

palette = "catppuccin_mocha"

[fill]
symbol = " "
style = "cyan"

[directory]
style = "bold fg:base bg:lavender"
truncation_length = 2
truncation_symbol = "…/"
format = "[](lavender)[$symbol$path]($style)[](lavender)"

[character]
success_symbol = "[󰄾](bold blue)"
error_symbol = "[󰄾](bold red)"

[os]
disabled = false
style = "bold purple"

[os.symbols]
CachyOS = " "
Arch = "󰣇 "
Ubuntu = "󰕈 "
Windows = "󰍲 "

[git_branch]
symbol = "[](base) "
style = "fg:lavender bg:base"
truncation_length = 35
truncation_symbol = "…"
format = "[$symbol$branch]($style)[](base) "

[git_status]
format = "[](dirtypink)[$untracked$staged$modified$renamed$conflicted$ahead_behind](bg:dirtypink)[ ](dirtypink)"
style = "bg:dirtypink"
# options available for format
staged     = "[+](fg:green bg:dirtypink)"
modified   = "[!](fg:yellow bg:dirtypink)"
renamed    = "[»](fg:blue bg:dirtypink)"
deleted    = "[-](fg:red bg:dirtypink)"
untracked  = "[?](fg:red bg:dirtypink)"
stashed    = "[≡](fg:lavender bg:dirtypink)"
conflicted = "[✖](red fg:bold bg:dirtypink)"

ahead      = "[⇡${count} ](fg:teal bg:dirtypink)"
behind     = "[⇣${count} ](fg:peach bg:dirtypink)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](fg:mauve bg:dirtypink)"

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"

[docker_context]
disabled = false
symbol = " "
style = "bold blue"
only_with_files = false
format = "at [$symbol$context]($style) "

[kubernetes]
symbol = "☸ "
style = "bold blue"
disabled = false
format = 'in [$symbol$context]($style) '

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style)"

[dotnet]
symbol = "󰪮 " # The .NET logo/icon
style = "bold blue"
format = "via [$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = 'via [${symbol}${pyenv_prefix}(${version} )($virtualenv )]($style)'

[palettes.catppuccin_mocha]
# --- background ---
crust = "#11111b"
mantle = "#181825"
base = "#1e1e2e" # git branch bg

overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"

surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"

# --- text ---
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"

# --- accents (catppuccin_mocha) ---
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe" # git branch fg

dirtypink = "#240f33" # git status bg
