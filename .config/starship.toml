"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$shlvl$jobs$status$fill$cmd_duration$battery$memory_usage${custom.disk_usage}$os$sudo$docker_context
$git_branch$git_commit$git_state${custom.git_identity}$git_status$nodejs$dotnet$python$kubernetes
$character"""

palette = "catppuccin_mocha"

[fill]
symbol = " "
style = "cyan"

[directory]
style = "bold fg:base bg:lavender"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = true
format = "[î‚¶](lavender)[$symbol$path]($style)[î‚´](lavender) "

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "َ±‘¢ "
"Music" = "َ°‌ڑ "
"Pictures" = "َ°‰ڈ "
"dotfiles" = "َ°’“ "

[character]
success_symbol = "[َ°„¾](bold sky)"
error_symbol = "[َ°„¾](bold maroon)"

[os]
disabled = false
style = "bg:mauve fg:base"
format = "[î‚¶](mauve)[ $symbol ]($style)[î‚´](mauve) "

[os.symbols]
Linux = "ïŒڑ"
CachyOS = "ïŒ‍"
Arch = "َ°£‡"
Ubuntu = "َ°•ˆ"
Windows = "َ°چ²"

[jobs]
symbol = "ï€“ "
