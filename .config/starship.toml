truncation_symbol = "â€¦"
format = "[î‚¶](base)[$symbol$branch]($style)[î‚´](base) "

[git_commit]
commit_hash_length = 4
tag_symbol = "ïگ’ "
style = "bg:base fg:subtext1"
format = "[î‚¶](base)[$symbol$hash]($style)[î‚´](base) "

[git_state]
style = "bg:base fg:maroon"
format = "[î‚¶](base)[$state($progress_current/$progress_total)]($style)[î‚´](base) "

[git_status]
format = "([$staged$modified$deleted$renamed$untracked$stashed$conflicted$ahead_behind](fg:pink))"
style = "fg:pink"
staged     = "[î‚¶](pink)[staged](bg:pink fg:base)[î‚´](pink) "
modified   = "[î‚¶](pink)[modified](bg:pink fg:base)[î‚´](pink) "
deleted    = "[î‚¶](pink)[deleted](bg:pink fg:base)[î‚´](pink) "
renamed    = "[î‚¶](pink)[renamed](bg:pink fg:base)[î‚´](pink) "
untracked  = "[î‚¶](pink)[untracked](bg:pink fg:base)[î‚´](pink) "
stashed    = "[î‚¶](pink)[stashed](bg:pink fg:base)[î‚´](pink) "
conflicted = "[î‚¶](pink)[conflict](bg:pink fg:base)[î‚´](pink) "
ahead      = "[î‚¶](pink)[َ°¶£${count}](bg:pink fg:base)[î‚´](pink) "
behind     = "[î‚¶](pink)[َ°¶،${count}](bg:pink fg:base)[î‚´](pink) "
diverged   = "[î‚¶](pink)[َ°¶¤َ°¶£${ahead_count}َ°¶،${behind_count}](bg:pink fg:base)[î‚´](pink) "

[nodejs]
symbol = "îœک "
style = "bg:teal fg:base"
format = "[î‚¶](teal)[$symbol($version)]($style)[î‚´](teal) "

[docker_context]
disabled = false
symbol = "ïŒˆ "
style = "bg:sky fg:base"
only_with_files = false
format = "[î‚¶](sky)[$symbol$context]($style)[î‚´](sky) "

[kubernetes]
symbol = "âک¸ "
style = "bg:sky fg:base"
disabled = false
format = "[î‚¶](sky)[$symbol$context]($style)[î‚´](sky) "

[cmd_duration]
min_time = 500
style = "bg:peach fg:base"
format = "[î‚¶](peach)[َ±ژ« $duration]($style)[î‚´](peach) "

[battery]
full_symbol = "َ°پ¹ "
charging_symbol = "َ°‚„ "
discharging_symbol = "َ°‚ƒ "
format = "[$styleî‚¶](fg:$style)[$symbol$percentage](bg:$style fg:base)[î‚´ $style](fg:$style) "

[[battery.display]]
threshold = 20
style = "maroon"

[[battery.display]]
threshold = 50
style = "peach"

[memory_usage]
disabled = true
threshold = 75
symbol = "َ°چ› "
style = "bg:pink fg:base"
format = "[î‚¶](pink)[$symbol$ram_pct]($style)[î‚´](pink) "

[custom.disk_usage]
command = "usage=$(df $HOME --output=pcent | tail -1 | tr -dc '0-9'); if [ \"$usage\" -gt 85 ]; then echo $usage; fi"
shell = ["sh"]
style = "bg:maroon fg:base"
format = "([î‚¶](maroon)[َ°‹ٹ $output%]($style)[î‚´](maroon) )"
when = "true"

[custom.git_identity]
command = "local=$(git config --local user.email); global=$(git config --global user.email); if [ -n \"$local\" ] && [ \"$local\" != \"$global\" ]; then echo \"$local\"; fi"
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
shell = ["sh"]
style = "bg:lavender fg:base"
format = "([î‚¶](lavender)[ï€‡ $output]($style)[î‚´](lavender) )"

[dotnet]
symbol = "َ°ھ® "
style = "bg:sky fg:base"
format = "[î‚¶](sky)[$symbol($version)]($style)[î‚´](sky) "

[python]
symbol = "îک† "
style = "bg:rosewater fg:base"
format = "[î‚¶](rosewater)[$symbol${pyenv_prefix}($version )($virtualenv)]($style)[î‚´](rosewater) "

[status]
disabled = false
style = "bg:maroon fg:base"
symbol = "âœک"
format = "[î‚¶](maroon)[ $symbol ]($style)[î‚´](maroon) "
map_symbol = true

[sudo]
disabled = false
symbol = "َ°‍€"
style = "bg:maroon fg:base"
format = "[î‚¶](maroon)[ $symbol ]($style)[î‚´](maroon) "

