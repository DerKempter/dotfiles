"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$fill$cmd_duration$os$docker_context
$git_branch$git_status$nodejs$dotnet$python$kubernetes
$character"""

[fill]
symbol = " "
style = "cyan"

[directory]
style = "bold red"
truncation_length = 2
truncation_symbol = "…/"

[character]
success_symbol = "[󰄾](bold blue)"
error_symbol = "[󰄾](bold red)"

[os]
disabled = false
style = "bold purple"

[os.symbols]
CachyOS = " "
Arch = "󰣇 "
Ubuntu = "󰕈 "
Windows = "󰍲 "

[git_branch]
symbol = " "
style = "bold magenta"
truncation_length = 35
truncation_symbol = "…"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'

[nodejs]
symbol = " "
style = "bold green"
format = "via [$symbol($version )]($style)"

[docker_context]
disabled = false
symbol = " "
style = "bold blue"
only_with_files = false
format = "at [$symbol$context]($style) "

[kubernetes]
symbol = "☸ "
style = "bold blue"
disabled = false
format = 'in [$symbol$context]($style) '

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style)"

[dotnet]
symbol = "󰪮 " # The .NET logo/icon
style = "bold blue"
format = "via [$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = 'via [${symbol}${pyenv_prefix}(${version} )($virtualenv )]($style)'
